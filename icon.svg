<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="cable" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="40%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="round">
      <rect width="512" height="512" rx="100" ry="100"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#60a5fa" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>

  <!-- Glow halo behind fiber -->
  <ellipse cx="256" cy="256" rx="130" ry="40" fill="#f59e0b" opacity="0.12" filter="url(#softglow)"/>

  <!-- Fiber optic cable — outer sheath -->
  <path d="M 60 290 Q 130 200 256 256 Q 382 312 452 222"
        fill="none" stroke="#334155" stroke-width="28" stroke-linecap="round"/>

  <!-- Fiber optic cable — inner core glow -->
  <path d="M 60 290 Q 130 200 256 256 Q 382 312 452 222"
        fill="none" stroke="url(#cable)" stroke-width="10" stroke-linecap="round"
        filter="url(#glow)" opacity="0.95"/>

  <!-- Fiber tip glow — left -->
  <circle cx="60" cy="290" r="18" fill="#fde68a" opacity="0.9" filter="url(#glow)"/>
  <circle cx="60" cy="290" r="8" fill="#ffffff"/>

  <!-- Fiber tip glow — right -->
  <circle cx="452" cy="222" r="18" fill="#fde68a" opacity="0.9" filter="url(#glow)"/>
  <circle cx="452" cy="222" r="8" fill="#ffffff"/>

  <!-- Light particles along the fiber -->
  <circle cx="150" cy="238" r="5" fill="#fef3c7" opacity="0.85" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="7" fill="#fde68a" opacity="0.9" filter="url(#glow)"/>
  <circle cx="362" cy="274" r="5" fill="#fef3c7" opacity="0.85" filter="url(#glow)"/>

  <!-- "FC" lettering — premium -->
  <text x="256" y="420"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-weight="900"
        font-size="72"
        text-anchor="middle"
        letter-spacing="-2"
        fill="url(#glow1)"
        opacity="0.95">FC</text>

  <!-- Thin amber line accent under text -->
  <line x1="186" y1="435" x2="326" y2="435" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
</svg>
